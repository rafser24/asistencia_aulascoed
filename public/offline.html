<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Sin conexión — Asistencia COED</title>
  <style>
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      min-height: 100vh; display: flex; align-items: center; justify-content: center;
      font-family: 'Segoe UI', sans-serif; padding: 24px;
      background: linear-gradient(135deg, #f5f0ff, #ede9fe);
    }
    .card {
      background: #fff; border-radius: 24px; padding: 40px 32px;
      text-align: center; max-width: 320px;
      box-shadow: 0 8px 32px rgba(124,58,237,0.1);
      border: 1px solid rgba(167,139,250,0.25);
    }
    .icon { font-size: 56px; margin-bottom: 20px; }
    h1 { font-size: 20px; font-weight: 800; color: #1e1b2e; margin-bottom: 8px; }
    p { font-size: 13px; color: #7c6fa0; line-height: 1.6; margin-bottom: 20px; }
    button {
      background: linear-gradient(135deg, #a78bfa, #818cf8);
      color: #fff; border: none; border-radius: 12px;
      padding: 12px 24px; font-size: 13px; font-weight: 700;
      cursor: pointer; width: 100%;
    }
  </style>
</head>
<body>
  <div class="card">
    <div class="icon">📡</div>
    <h1>Sin conexión</h1>
    <p>No hay internet disponible. Conéctate a una red WiFi o activa tus datos móviles para registrar tu asistencia.</p>
    <button onclick="window.location.reload()">Reintentar</button>
  </div>
</body>
</html>
